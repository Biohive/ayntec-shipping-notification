{% extends "base.html" %}

{% block title %}{{ title }} – {{ app_name }}{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-20 text-center">
  <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
    <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
    </svg>
  </div>
  <h1 class="text-2xl font-bold text-gray-900 mb-3">{{ title }}</h1>
  <p class="text-gray-500 mb-8">{{ message }}</p>
  <a href="/" class="inline-block bg-brand-600 hover:bg-brand-700 text-white font-semibold px-6 py-2.5 rounded-xl text-sm">
    ← Back to Home
  </a>
</div>
{% endblock %}
